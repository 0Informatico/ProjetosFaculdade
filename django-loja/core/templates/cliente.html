{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django 1 - contatos</title>
</head>
<body>
    <h1>Cliente</h1>
    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>E-mail</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><a href="/contatos/">{{clientes.nome}} {{clientes.sobrenome}}</a></td>
                <td>{{clientes.email}}</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
